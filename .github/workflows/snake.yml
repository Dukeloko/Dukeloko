name: Generar Serpiente

on:
  schedule:
    - cron: "0 0 * * *" # Se actualiza a la medianoche
  workflow_dispatch: # Para correrlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Genera la serpiente en versión clara y oscura
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Dukeloko
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            
      # Empuja las imágenes generadas a una rama llamada "output"
      - name: Guardar la serpiente en GitHub
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
